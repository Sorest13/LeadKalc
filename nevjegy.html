<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garamszegi Marcell — LeadKalc</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#06080F;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:'Instrument Sans',sans-serif;}
.card{width:100%;max-width:420px;border-radius:24px;padding:0;position:relative;overflow:hidden;background:#080C18;border:1px solid rgba(255,255,255,.09);box-shadow:0 32px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);}
.card-topbar{height:3px;width:100%;background:linear-gradient(90deg,#F59E0B,#F97316,#06B6D4);}
.card-grid{position:absolute;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:36px 36px;mask-image:radial-gradient(ellipse 100% 100% at 100% 0%,black 0%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 100% 100% at 100% 0%,black 0%,transparent 70%);}
.card-glow{position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.card-inner{position:relative;z-index:2;padding:28px 28px 24px;}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:24px;}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 4px 14px rgba(245,158,11,.35);flex-shrink:0;}
.logo-name{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.3px;color:#F1F5FF;}
.logo-name span{background:linear-gradient(135deg,#F59E0B,#F97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hr{height:1px;background:rgba(255,255,255,.06);margin:0 0 24px;}
.identity{display:flex;align-items:center;gap:16px;margin-bottom:26px;}
.avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#F97316);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.5px;box-shadow:0 6px 20px rgba(245,158,11,.4);}
.fullname{font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.5px;line-height:1.1;color:#F1F5FF;}
.title-badge{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;font-weight:600;letter-spacing:.3px;padding:3px 11px;border-radius:99px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#F59E0B;}
.contacts{display:flex;flex-direction:column;gap:8px;}
.crow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;text-decoration:none;transition:background .2s,border-color .2s,transform .15s;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);}
.crow:hover{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.22);transform:translateX(3px);}
.cicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(245,158,11,.1);}
.cicon svg{width:15px;height:15px;}
.cbody{flex:1;min-width:0;}
.clabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:#475569;}
.cval{font-size:13px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#CBD5E1;}
.carrow{font-size:14px;color:#334155;transition:transform .2s;}
.crow:hover .carrow{transform:translateX(3px);}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05);}
.foot-txt{font-size:11px;line-height:1.6;color:#334155;}
.foot-dot{width:8px;height:8px;border-radius:50%;background:#F59E0B;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
.copybtn{width:100%;margin-top:14px;padding:13px 20px;border-radius:13px;font-size:13px;font-weight:600;letter-spacing:.2px;cursor:pointer;background:rgba(245,158,11,.08);border:1.5px solid rgba(245,158,11,.3);color:#F59E0B;font-family:'Instrument Sans',sans-serif;transition:all .2s;}
.copybtn:hover{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.5);}
.copybtn.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:#10B981;}
</style>
</head>
<body>
<div style="width:100%;max-width:420px;">
  <div class="card">
    <div class="card-topbar"></div>
    <div class="card-grid"></div>
    <div class="card-glow"></div>
    <div class="card-inner">
      <div class="logo-row">
        <div class="logo-mark">⚡</div>
        <div class="logo-name">Lead<span>Kalc</span></div>
      </div>
      <div class="hr"></div>
      <div class="identity">
        <div class="avatar">GM</div>
        <div>
          <div class="fullname">Garamszegi Marcell</div>
          <div class="title-badge">✦ Ügyvezető</div>
        </div>
      </div>
      <div class="contacts">
        <a class="crow" href="tel:+36303562888">
          <div class="cicon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.64 19 19.45 19.45 0 0 1 5 12.36 19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div class="cbody">
            <div class="clabel">Telefon</div>
            <div class="cval">+36 30 356 2888</div>
          </div>
          <div class="carrow">›</div>
        </a>
        <a class="crow" href="mailto:info@leadkalc.hu">
          <div class="cicon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </div>
          <div class="cbody">
            <div class="clabel">Email</div>
            <div class="cval">info@leadkalc.hu</div>
          </div>
          <div class="carrow">›</div>
        </a>
        <a class="crow" href="https://leadkalc.hu">
          <div class="cicon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="cbody">
            <div class="clabel">Weboldal</div>
            <div class="cval">leadkalc.hu</div>
          </div>
          <div class="carrow">›</div>
        </a>
      </div>
      <div class="card-foot">
        <div class="foot-txt">Napelem &amp; klíma lead generátor<br>widgetek magyar cégeknek</div>
        <div class="foot-dot"></div>
      </div>
    </div>
  </div>
  <button class="copybtn" id="cb" onclick="doCopy()">Névjegy másolása vágólapra</button>
</div>
<script>
function doCopy(){
  var txt='Garamszegi Marcell\nÜgyvezető — LeadKalc\n\n📞 +36 30 356 2888\n📧 info@leadkalc.hu\n🌐 leadkalc.hu\n\nNapelem & klíma kalkulátor widget — kvalifikált leadek automatikusan.';
  navigator.clipboard.writeText(txt).then(function(){
    var b=document.getElementById('cb');
    b.textContent='✓ Kimásolva!';
    b.classList.add('done');
    setTimeout(function(){b.textContent='Névjegy másolása vágólapra';b.classList.remove('done');},2500);
  });
}
</script>
</body>
</html>
